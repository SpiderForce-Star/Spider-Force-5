<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spider-Force 5 | Webb Spinner Visions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;color:#0f0;touch-action:none}
#gameWrap{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:#000}
canvas{display:block;background:#000;max-width:100%;max-height:100%;touch-action:none}
#ui{position:absolute;inset:0;pointer-events:none;z-index:10}
#start,#end{position:absolute;inset:0;background:radial-gradient(ellipse at center,#001a12 0%,#000 75%);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#0ff;z-index:30;text-align:center;padding:20px}
#start h1{font-size:clamp(1.8rem,8vw,3.2rem);color:#0f8;text-shadow:0 0 25px #0f8;margin-bottom:6px;letter-spacing:3px;font-weight:700}
#start .credit{font-size:clamp(0.85rem,3.5vw,1.05rem);color:#6c8;margin-bottom:22px;letter-spacing:1px}
.btn{background:linear-gradient(180deg,#0a5,#053);border:2px solid #0f8;color:#0f8;padding:14px 36px;font-size:1.1rem;cursor:pointer;margin:10px;text-transform:uppercase;letter-spacing:2px;border-radius:4px;pointer-events:auto}
.btn:hover,.btn:active{background:#0f8;color:#000}
.ctrl{margin-top:18px;font-size:clamp(0.75rem,2.8vw,0.9rem);color:#5a7;max-width:520px;line-height:1.5;background:rgba(0,30,15,.55);padding:14px 18px;border:1px solid #0a4;border-radius:4px}
.hidden{display:none!important}
#muteBtn{position:absolute;top:10px;right:12px;z-index:40;background:rgba(0,40,20,.75);border:1px solid #0a5;color:#0f8;padding:7px 12px;font-size:12px;cursor:pointer;border-radius:4px;pointer-events:auto}
/* Mobile touch controls */
#touchControls{position:absolute;inset:0;pointer-events:none;z-index:20;display:none}
#touchControls.show{display:block}
.tbtn{position:absolute;pointer-events:auto;border-radius:50%;border:2px solid rgba(0,255,140,0.55);background:rgba(0,40,25,0.45);color:#0f8;font-weight:700;font-size:18px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none;transition:background .1s,border-color .1s}
.tbtn:active,.tbtn.active{background:rgba(0,180,100,0.55);border-color:#0f8;box-shadow:0 0 18px rgba(0,255,140,0.4)}
#btnUp{width:64px;height:64px;left:70px;bottom:150px}
#btnDown{width:64px;height:64px;left:70px;bottom:30px}
#btnLeft{width:64px;height:64px;left:18px;bottom:90px}
#btnRight{width:64px;height:64px;left:122px;bottom:90px}
#btnLaser{width:78px;height:78px;right:24px;bottom:110px;font-size:15px;border-radius:50%}
#btnMissile{width:64px;height:64px;right:30px;bottom:30px;font-size:13px}
#btnRoll{width:56px;height:56px;right:110px;bottom:40px;font-size:12px}
#btnPause{width:48px;height:48px;left:12px;top:12px;font-size:14px}
@media (min-width:900px){
  #touchControls{display:none!important}
}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="c" width="1280" height="720"></canvas>
  <div id="ui">
    <button id="muteBtn">SOUND: ON</button>
    <div id="touchControls">
      <div class="tbtn" id="btnUp">▲</div>
      <div class="tbtn" id="btnDown">▼</div>
      <div class="tbtn" id="btnLeft">◀</div>
      <div class="tbtn" id="btnRight">▶</div>
      <div class="tbtn" id="btnLaser">LASER</div>
      <div class="tbtn" id="btnMissile">MISSILE</div>
      <div class="tbtn" id="btnRoll">ROLL</div>
      <div class="tbtn" id="btnPause">❚❚</div>
    </div>
  </div>
  <div id="start">
    <h1>SPIDER-FORCE 5</h1>
    <div class="credit">Created by Webb Spinner Visions</div>
    <button class="btn" id="go">Launch Mission</button>
    <div class="ctrl">
      <b>CONTROLS</b><br>
      Desktop: WASD / Arrows + Space / Enter / Shift<br>
      Mobile: On-screen buttons (shown automatically)<br>
      Esc or Pause button to pause
    </div>
  </div>
  <div id="end" class="hidden">
    <h1 id="et">MISSION COMPLETE</h1>
    <p id="em" style="font-size:1.2rem;margin:16px 0;color:#8f8"></p>
    <p style="margin-bottom:6px">Final Score: <span id="fs">0</span></p>
    <p style="font-size:.9rem;color:#6a8;margin-bottom:18px">Created by Webb Spinner Visions</p>
    <button class="btn" id="re">Fly Again</button>
  </div>
</div>

<script>
// ============================================================
// SPIDER-FORCE 5  v3  – Mobile + Performance + Rock Music
// Created by Webb Spinner Visions
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const W = 1280, H = 720, CX = W/2, CY = H/2;
const FOCAL = 500, NEAR = 2.5, FAR = 400;

// Detect mobile / touch
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0 || window.matchMedia('(max-width:900px)').matches;
const touchUI = document.getElementById('touchControls');
if (isMobile) touchUI.classList.add('show');

// Audio
let audioCtx = null, masterGain = null, muted = false;
let engineOsc = null, engineGain = null, musicNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.32;
  masterGain.connect(audioCtx.destination);
}

function playTone(freq, type, dur, vol=0.25, slide=0) {
  if (!audioCtx || muted) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(audioCtx.currentTime + dur + 0.02);
}

function playNoise(dur, vol=0.2, freq=700) {
  if (!audioCtx || muted) return;
  const len = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 1.4);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = freq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(f); f.connect(g); g.connect(masterGain);
  src.start();
}

function sfxLaser(){ playTone(920,'square',0.07,0.13,-450); playTone(1400,'square',0.04,0.07,-700); }
function sfxMissile(){ playTone(160,'sawtooth',0.28,0.18,90); playNoise(0.28,0.14,380); }
function sfxExplode(){ playNoise(0.5,0.32,550); playTone(80,'sawtooth',0.45,0.22,-40); }
function sfxHit(){ playTone(200,'square',0.1,0.18,-90); playNoise(0.12,0.15,850); }
function sfxEnemyLaser(){ playTone(380,'sawtooth',0.09,0.1,-160); }
function sfxDamage(){ playTone(120,'square',0.18,0.25,-50); playNoise(0.22,0.18,280); }
function sfxMeteor(){ playNoise(0.18,0.11,220); }

function startEngine(){
  if (!audioCtx || muted || engineOsc) return;
  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 48;
  engineGain.gain.value = 0.035;
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 160;
  engineOsc.connect(f); f.connect(engineGain); engineGain.connect(masterGain);
  engineOsc.start();
}
function stopEngine(){ if(engineOsc){try{engineOsc.stop()}catch(e){} engineOsc=null; engineGain=null;} }

// Rock & Roll style music – driving bass + rhythmic power
let musicTimer = null;
function startMusic(){
  if (!audioCtx || muted || musicTimer) return;
  const bass = [55, 55, 73.4, 55, 82.4, 55, 73.4, 55];
  const power = [110, 146.8, 164.8, 146.8];
  let step = 0;
  musicTimer = setInterval(()=>{
    if (muted || !audioCtx) return;
    playTone(bass[step % bass.length], 'sawtooth', 0.18, 0.14, -20);
    if (step % 2 === 0) {
      playTone(power[step % power.length], 'square', 0.12, 0.06);
      playTone(power[step % power.length]*1.5, 'triangle', 0.1, 0.04);
    }
    if (step % 4 === 2) playNoise(0.08, 0.08, 1200);
    step++;
  }, 220);
}
function stopMusic(){ if(musicTimer){clearInterval(musicTimer); musicTimer=null;} }

// Game state
let state='start', ch=1, score=0, hull=100, missiles=5, activeM=null;
let timer=0, kills=0, need=12, last=0, keys={};
let bank=0, tBank=0, roll=0, rolling=false, rT=0;
let yaw=0, pitch=0, yV=0, pV=0;
let stars=[], enemies=[], meteors=[], pLasers=[], eLasers=[], parts=[], expl=[];
let planets=[], flash=0, shake=0, msgs=[], lastFire=0, lastM=0;
let done=false, between=false, bT=0;
let touchActive = {up:false,down:false,left:false,right:false,laser:false,missile:false,roll:false};

// Longer challenges
const CHs = [
  {n:"First Contact",        d:210, need:14, spawn:2.1, spd:16, hp:1,   fr:2.7, max:6},
  {n:"Swarm Rising",         d:240, need:20, spawn:1.6, spd:20, hp:1.3, fr:2.2, max:9},
  {n:"Heavy Assault",        d:270, need:26, spawn:1.25,spd:24, hp:1.9, fr:1.75,max:11},
  {n:"Elite Wing",           d:300, need:32, spawn:1.0, spd:28, hp:2.6, fr:1.4, max:13},
  {n:"Spider's Final Stand", d:330, need:40, spawn:0.8, spd:33, hp:3.5, fr:1.1, max:15}
];

// Performance scaling
const STAR_COUNT = isMobile ? 140 : 240;
const MAX_PARTS  = isMobile ? 55 : 90;
const MAX_METEORS= isMobile ? 3 : 5;

function R(a,b){return Math.random()*(b-a)+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z)}

function initStars(){
  stars=[];
  for(let i=0;i<STAR_COUNT;i++){
    stars.push({x:R(-300,300),y:R(-200,200),z:R(NEAR,FAR),bright:R(0.35,1),size:R(0.55,2.1),hue:Math.random()<0.12?R(180,220):R(195,230)});
  }
}
function initPlanets(){
  planets=[];
  for(let i=0;i<3;i++){
    planets.push({x:R(-160,160),y:R(-90,90),z:R(270,370),r:R(20,48),color:`hsl(${R(18,48)},${R(45,65)}%,${R(28,42)}%)`,ring:Math.random()<0.3});
  }
}

function reset(n){
  const c=CHs[n-1];
  ch=n; missiles=5; activeM=null;
  enemies=[]; meteors=[]; pLasers=[]; eLasers=[]; parts=[]; expl=[];
  timer=c.d; need=c.need; kills=0; done=false; between=false;
  yaw=0; pitch=0; bank=0; tBank=0; roll=0; rolling=false;
  hull=Math.min(100,hull+20);
  msg(`CHALLENGE ${n}: ${c.n}`);
}

function startGame(){
  initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  startEngine(); startMusic();
  score=0; hull=100;
  initStars(); initPlanets();
  reset(1);
  state='playing';
  document.getElementById('start').classList.add('hidden');
  document.getElementById('end').classList.add('hidden');
  last=performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('go').onclick = startGame;
document.getElementById('re').onclick = ()=>{document.getElementById('end').classList.add('hidden'); startGame();};
document.getElementById('muteBtn').onclick = ()=>{
  muted=!muted;
  document.getElementById('muteBtn').textContent = muted ? 'SOUND: OFF' : 'SOUND: ON';
  if(muted){stopEngine();stopMusic();}
  else if(state==='playing'){startEngine();startMusic();}
};

// Keyboard
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Escape'&&state==='playing') state='paused';
  else if(e.code==='Escape'&&state==='paused'){state='playing';last=performance.now();requestAnimationFrame(loop);}
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.code]=false);

// Touch controls
function bindTouch(id, key){
  const el = document.getElementById(id);
  const down = e=>{e.preventDefault(); touchActive[key]=true; el.classList.add('active');};
  const up   = e=>{e.preventDefault(); touchActive[key]=false; el.classList.remove('active');};
  el.addEventListener('touchstart', down, {passive:false});
  el.addEventListener('touchend', up, {passive:false});
  el.addEventListener('touchcancel', up, {passive:false});
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
}
bindTouch('btnUp','up'); bindTouch('btnDown','down');
bindTouch('btnLeft','left'); bindTouch('btnRight','right');
bindTouch('btnLaser','laser'); bindTouch('btnMissile','missile');
bindTouch('btnRoll','roll');
document.getElementById('btnPause').addEventListener('touchstart', e=>{
  e.preventDefault();
  if(state==='playing') state='paused';
  else if(state==='paused'){state='playing';last=performance.now();requestAnimationFrame(loop);}
},{passive:false});

// Responsive canvas
function resize(){
  const wrap = document.getElementById('gameWrap');
  const ratio = W/H;
  let cw = window.innerWidth, ch = window.innerHeight;
  if(cw/ch > ratio){ cw = ch * ratio; } else { ch = cw / ratio; }
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resize);
resize();

function spawnEnemy(){
  const c=CHs[ch-1];
  if(enemies.length>=c.max) return;
  const side=Math.random()<0.5?-1:1;
  enemies.push({
    x:R(-70,70)+side*R(18,50), y:R(-48,48), z:R(160,300),
    vx:R(-7,7), vy:R(-4.5,4.5),
    hp:c.hp, mhp:c.hp, spd:c.spd*R(0.87,1.13),
    cd:R(0.5,c.fr), type:Math.random()<0.2?'elite':'basic',
    rot:R(0,6.28)
  });
}
function spawnMeteor(){
  if(meteors.length>=MAX_METEORS) return;
  meteors.push({
    x:R(-95,95), y:R(-65,65), z:R(190,330),
    vx:R(-11,11), vy:R(-7,7),
    spd:R(20,36), rot:R(0,6.28), spin:R(-2.8,2.8),
    size:R(8,17), hp:2
  });
}

function fireL(){
  const now=performance.now()/1000;
  if(now-lastFire<0.15) return;
  lastFire=now; sfxLaser();
  [-7,7].forEach(ox=>pLasers.push({x:ox+yaw*13,y:pitch*8,z:9,spd:235,life:1.1,dmg:1}));
}
function fireM(){
  if(activeM||missiles<=0) return;
  const now=performance.now()/1000;
  if(now-lastM<0.4) return;
  lastM=now; missiles--; sfxMissile();
  activeM={x:yaw*10,y:pitch*6,z:13,spd:95};
  msg("MISSILE AWAY — TAP AGAIN TO DETONATE");
}
function detonate(){
  if(!activeM) return;
  const m=activeM; sfxExplode();
  expl.push({x:m.x,y:m.y,z:m.z,r:0,mr:56,life:0.65,hit:false});
  for(let i=0;i<32;i++) parts.push({
    x:m.x,y:m.y,z:m.z,vx:R(-40,40),vy:R(-40,40),vz:R(-25,25),
    life:R(0.35,0.8),col:`hsl(${R(12,48)},100%,${R(48,68)}%)`,sz:R(1.8,4.5)
  });
  if(parts.length>MAX_PARTS) parts.length=MAX_PARTS;
  flash=0.48; shake=13; activeM=null;
  msg("MISSILE DETONATED");
}

function update(dt){
  if(state!=='playing') return;
  if(between){
    bT-=dt;
    if(bT<=0){between=false; if(ch>=5){end(true);return;} reset(ch+1);}
    return;
  }
  timer-=dt;
  const c=CHs[ch-1];
  const ts=1.6, my=0.54, mp=0.39;

  // Combined keyboard + touch
  const left  = keys.KeyA||keys.ArrowLeft ||touchActive.left;
  const right = keys.KeyD||keys.ArrowRight||touchActive.right;
  const up    = keys.KeyW||keys.ArrowUp   ||touchActive.up;
  const down  = keys.KeyS||keys.ArrowDown ||touchActive.down;

  if(left){ yV=-ts; tBank=0.33; }
  else if(right){ yV=ts; tBank=-0.33; }
  else{ yV*=0.86; tBank*=0.88; }
  if(up) pV=-ts*0.78;
  else if(down) pV=ts*0.78;
  else pV*=0.86;

  yaw=clamp(yaw+yV*dt,-my,my);
  pitch=clamp(pitch+pV*dt,-mp,mp);
  bank+=(tBank-bank)*5.6*dt;

  // Roll
  if((keys.ShiftLeft||keys.ShiftRight||touchActive.roll)&&!rolling&&Math.abs(yV)>0.9){
    rolling=true; rT=0;
    if(touchActive.roll) touchActive.roll=false;
  }
  if(rolling){
    rT+=dt; roll=(rT/0.7)*Math.PI*2;
    if(rT>=0.7){rolling=false;roll=0;}
  }

  if(keys.Space||touchActive.laser) fireL();
  if(keys.Enter||touchActive.missile){
    if(activeM) detonate(); else fireM();
    keys.Enter=false; touchActive.missile=false;
  }

  // Stars
  const starSpd = 56;
  for(let i=0;i<stars.length;i++){
    const s=stars[i];
    s.z-=starSpd*dt;
    if(s.z<NEAR){s.z=FAR;s.x=R(-300,300);s.y=R(-200,200);}
  }

  // Planets
  for(let i=0;i<planets.length;i++){
    const p=planets[i];
    p.z-=7.5*dt;
    if(p.z<110){p.z=R(290,380);p.x=R(-160,160);p.y=R(-90,90);}
  }

  if(Math.random()<dt/c.spawn) spawnEnemy();
  if(Math.random()<dt*0.16) spawnMeteor();

  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.z-=e.spd*dt; e.x+=e.vx*dt; e.y+=e.vy*dt;
    e.vx+=(-e.x*0.13-e.vx*0.38)*dt;
    e.vy+=(-e.y*0.11-e.vy*0.38)*dt;
    e.rot+=dt*0.35; e.cd-=dt;

    if(e.cd<=0&&e.z<150&&e.z>13){
      eLasers.push({x:e.x,y:e.y,z:e.z,tx:-yaw*36+R(-7,7),ty:-pitch*26+R(-5,5),spd:86,life:2.2});
      e.cd=c.fr*R(0.7,1.25); sfxEnemyLaser();
    }
    if(e.z<4.2){
      if(Math.abs(e.x)<11.5&&Math.abs(e.y)<9.5){hull-=16;flash=0.48;shake=15;sfxDamage();msg("HULL BREACH!");}
      enemies.splice(i,1); continue;
    }
    if(e.hp<=0){
      score+=Math.floor(92+e.z); kills++; sfxHit();
      for(let p=0;p<12;p++) parts.push({x:e.x,y:e.y,z:e.z,vx:R(-38,38),vy:R(-38,38),vz:R(-15,28),life:R(0.28,0.6),col:e.type==='elite'?'#f80':'#f44',sz:R(1.6,3.5)});
      if(parts.length>MAX_PARTS) parts.length=MAX_PARTS;
      enemies.splice(i,1);
    }
  }

  // Meteors
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.z-=m.spd*dt; m.x+=m.vx*dt; m.y+=m.vy*dt; m.rot+=m.spin*dt;
    if(m.z<5){
      if(Math.abs(m.x)<13&&Math.abs(m.y)<11){hull-=11;flash=0.38;shake=11;sfxDamage();msg("METEOR IMPACT!");}
      meteors.splice(i,1); continue;
    }
    if(m.hp<=0){
      score+=55; sfxMeteor();
      for(let p=0;p<9;p++) parts.push({x:m.x,y:m.y,z:m.z,vx:R(-26,26),vy:R(-26,26),vz:R(-8,18),life:R(0.22,0.48),col:'#a86',sz:R(1.4,2.8)});
      meteors.splice(i,1);
    }
  }

  // Player lasers
  for(let i=pLasers.length-1;i>=0;i--){
    const l=pLasers[i];
    l.z+=l.spd*dt; l.life-=dt;
    if(l.life<=0||l.z>FAR){pLasers.splice(i,1);continue;}
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.abs(l.z-e.z)<11&&Math.hypot(l.x-e.x,l.y-e.y)<13.5){
        e.hp-=l.dmg;
        for(let p=0;p<4;p++) parts.push({x:e.x,y:e.y,z:e.z,vx:R(-15,15),vy:R(-15,15),vz:R(-6,14),life:0.25,col:'#4af',sz:1.5});
        pLasers.splice(i,1); break;
      }
    }
    for(let j=meteors.length-1;j>=0;j--){
      const m=meteors[j];
      if(Math.abs(l.z-m.z)<13&&Math.hypot(l.x-m.x,l.y-m.y)<m.size*1.05){
        m.hp-=1; pLasers.splice(i,1); break;
      }
    }
  }

  // Enemy lasers
  for(let i=eLasers.length-1;i>=0;i--){
    const l=eLasers[i];
    l.x+=(l.tx-l.x)*2.25*dt;
    l.y+=(l.ty-l.y)*2.25*dt;
    l.z-=l.spd*dt; l.life-=dt;
    if(l.z<3.2){
      if(Math.abs(l.x-yaw*19)<13&&Math.abs(l.y-pitch*14)<11){hull-=6.5+ch*1.3;flash=0.32;shake=8;sfxDamage();}
      eLasers.splice(i,1); continue;
    }
    if(l.life<=0) eLasers.splice(i,1);
  }

  if(activeM){
    activeM.z+=activeM.spd*dt;
    activeM.x*=0.972; activeM.y*=0.972;
    if(activeM.z>FAR-18) activeM=null;
  }

  for(let i=expl.length-1;i>=0;i--){
    const x=expl[i];
    x.r+=(x.mr-x.r)*7.2*dt; x.life-=dt;
    if(!x.hit&&x.r>x.mr*0.38){
      x.hit=true;
      enemies.forEach(e=>{if(dist(x,e)<x.mr*1.08){e.hp-=3.4;if(e.hp<=0){score+=140;kills++;}}});
      meteors.forEach(m=>{if(dist(x,m)<x.mr*0.95) m.hp-=3;});
    }
    if(x.life<=0) expl.splice(i,1);
  }

  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; p.life-=dt;
    if(p.life<=0) parts.splice(i,1);
  }

  flash=Math.max(0,flash-dt*1.65);
  shake=Math.max(0,shake-dt*23);

  if(hull<=0){hull=0;end(false);return;}
  if(kills>=need&&!done){
    done=true; between=true; bT=3.5;
    score+=Math.floor(timer*4)+ch*200;
    msg(`CHALLENGE ${ch} COMPLETE!`);
  }
}

function proj(x,y,z){
  if(z<=NEAR) z=NEAR+0.01;
  const sc=FOCAL/z;
  return {sx:CX+(x-yaw*38)*sc, sy:CY+(y-pitch*28)*sc, sc};
}

function drawStars(){
  ctx.save();
  ctx.translate(CX,CY); ctx.rotate(bank+roll); ctx.translate(-CX,-CY);
  for(let i=0;i<stars.length;i++){
    const s=stars[i];
    const p=proj(s.x,s.y,s.z);
    const b=clamp(1.1-s.z/FAR,0.12,1)*s.bright;
    const sz=clamp(s.size*(FOCAL/s.z)*0.016,0.45,2.4);
    ctx.fillStyle=`hsla(${s.hue},65%,72%,${b})`;
    ctx.beginPath(); ctx.arc(p.sx,p.sy,sz,0,6.2832); ctx.fill();
  }
  ctx.restore();
}

function drawPlanets(){
  ctx.save();
  ctx.translate(CX,CY); ctx.rotate(bank+roll); ctx.translate(-CX,-CY);
  for(let i=0;i<planets.length;i++){
    const pl=planets[i];
    const p=proj(pl.x,pl.y,pl.z);
    const r=pl.r*p.sc*0.11;
    if(r<2.5) continue;
    const g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*1.35);
    g.addColorStop(0,pl.color);
    g.addColorStop(0.75,pl.color.replace(')',',0.35)').replace('hsl','hsla'));
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r*1.35,0,6.2832); ctx.fill();
    ctx.fillStyle=pl.color;
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,6.2832); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.32)';
    ctx.beginPath(); ctx.ellipse(p.sx+r*0.22,p.sy,r*0.65,r,0,-1.57,1.57); ctx.fill();
    if(pl.ring){
      ctx.strokeStyle='rgba(180,140,60,0.35)'; ctx.lineWidth=r*0.16;
      ctx.beginPath(); ctx.ellipse(p.sx,p.sy,r*1.55,r*0.32,0.25,0,6.2832); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawShip(e){
  const p=proj(e.x,e.y,e.z);
  const s=10.5*p.sc*0.088;
  if(s<1.2||p.sx<-50||p.sx>W+50) return;
  ctx.save();
  ctx.translate(p.sx,p.sy);
  ctx.rotate(e.rot*0.12);
  const hp=e.hp/e.mhp;
  if(e.type==='elite'){
    ctx.fillStyle=`rgb(255,${75+hp*95},18)`;
    ctx.strokeStyle='#fc8'; ctx.lineWidth=1.25;
    ctx.beginPath();
    ctx.moveTo(0,-s*1.45); ctx.lineTo(s*0.52,-s*0.18); ctx.lineTo(s*0.32,s*0.85);
    ctx.lineTo(0,s*0.4); ctx.lineTo(-s*0.32,s*0.85); ctx.lineTo(-s*0.52,-s*0.18);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=`rgb(215,${55+hp*75},8)`;
    ctx.beginPath(); ctx.moveTo(s*0.38,-s*0.08); ctx.lineTo(s*1.35,s*0.28); ctx.lineTo(s*0.48,s*0.48); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-s*0.38,-s*0.08); ctx.lineTo(-s*1.35,s*0.28); ctx.lineTo(-s*0.48,s*0.48); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(90,190,255,0.7)';
    ctx.beginPath(); ctx.ellipse(0,-s*0.48,s*0.2,s*0.32,0,0,6.2832); ctx.fill();
    ctx.fillStyle='rgba(255,110,0,0.85)';
    ctx.beginPath(); ctx.arc(-s*0.2,s*0.68,s*0.16,0,6.2832); ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.2,s*0.68,s*0.16,0,6.2832); ctx.fill();
  } else {
    ctx.fillStyle=`rgb(255,${38+hp*72},42)`;
    ctx.strokeStyle='#f99'; ctx.lineWidth=1.15;
    ctx.beginPath();
    ctx.moveTo(0,-s*1.3); ctx.lineTo(s*0.68,s*0.12); ctx.lineTo(s*0.32,s*0.8);
    ctx.lineTo(0,s*0.38); ctx.lineTo(-s*0.32,s*0.8); ctx.lineTo(-s*0.68,s*0.12);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=`rgb(195,${28+hp*55},28)`;
    ctx.beginPath(); ctx.moveTo(s*0.48,s*0.08); ctx.lineTo(s*1.05,s*0.5); ctx.lineTo(s*0.38,s*0.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-s*0.48,s*0.08); ctx.lineTo(-s*1.05,s*0.5); ctx.lineTo(-s*0.38,s*0.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,75,0,0.78)';
    ctx.beginPath(); ctx.arc(0,s*0.62,s*0.2,0,6.2832); ctx.fill();
  }
  ctx.restore();
}

function drawMeteor(m){
  const p=proj(m.x,m.y,m.z);
  const s=m.size*p.sc*0.085;
  if(s<1.8) return;
  ctx.save();
  ctx.translate(p.sx,p.sy);
  ctx.rotate(m.rot);
  ctx.fillStyle='#655545';
  ctx.strokeStyle='#877767'; ctx.lineWidth=1.1;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=(i/6)*6.2832;
    const r=s*(0.72+Math.sin(i*2.1)*0.22);
    if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.arc(-s*0.18,-s*0.12,s*0.18,0,6.2832); ctx.fill();
  ctx.restore();
}

function drawPL(){
  for(let i=0;i<pLasers.length;i++){
    const l=pLasers[i];
    const p1=proj(l.x,l.y,l.z), p2=proj(l.x,l.y,l.z+16);
    ctx.strokeStyle=`rgba(70,185,255,${clamp(l.life,0,1)})`;
    ctx.lineWidth=3.1*(p1.sc*0.018);
    ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke();
  }
}
function drawEL(){
  for(let i=0;i<eLasers.length;i++){
    const l=eLasers[i];
    const p1=proj(l.x,l.y,l.z), p2=proj(l.x*0.72,l.y*0.72,l.z+12);
    ctx.strokeStyle='rgba(255,38,38,0.88)'; ctx.lineWidth=2.4;
    ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke();
  }
}
function drawMissile(){
  if(!activeM) return;
  const m=activeM, p=proj(m.x,m.y,m.z), s=5.5*p.sc*0.075;
  ctx.save(); ctx.translate(p.sx,p.sy);
  ctx.fillStyle='#0ff';
  ctx.beginPath(); ctx.moveTo(0,-s*1.4); ctx.lineTo(s*0.55,s); ctx.lineTo(-s*0.55,s); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawExpl(){
  for(let i=0;i<expl.length;i++){
    const x=expl[i];
    const p=proj(x.x,x.y,x.z); const r=x.r*p.sc*0.11; const a=clamp(x.life*1.3,0,0.75);
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,6.2832);
    ctx.fillStyle=`rgba(255,155,35,${a*0.3})`; ctx.fill();
    ctx.strokeStyle=`rgba(255,215,90,${a})`; ctx.lineWidth=2.5; ctx.stroke();
  }
}
function drawParts(){
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    const pr=proj(p.x,p.y,p.z);
    ctx.globalAlpha=clamp(p.life*1.8,0,1);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(pr.sx,pr.sy,p.sz*(pr.sc*0.035+0.4),0,6.2832); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawCockpit(){
  // Vignette
  const grd=ctx.createRadialGradient(CX,CY,130,CX,CY,520);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(0.6,'rgba(0,0,0,0.1)');
  grd.addColorStop(0.88,'rgba(0,0,0,0.5)');
  grd.addColorStop(1,'rgba(0,0,0,0.85)');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  // Frame
  ctx.fillStyle='#0a100a';
  ctx.fillRect(0,0,W,48);
  ctx.fillRect(0,H-108,W,108);
  ctx.fillStyle='#080e08';
  ctx.fillRect(0,48,96,H-156);
  ctx.fillRect(W-96,48,96,H-156);

  ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=2.5;
  ctx.strokeRect(2,2,W-4,H-4);
  ctx.beginPath();
  ctx.moveTo(96,48); ctx.lineTo(96,H-108);
  ctx.moveTo(W-96,48); ctx.lineTo(W-96,H-108);
  ctx.stroke();

  // Left switches
  for(let i=0;i<6;i++){
    const by=72+i*46;
    const lit=(i%3===0&&Math.sin(performance.now()/250+i)>0.25);
    ctx.fillStyle=lit?'#0f8':'#132813';
    ctx.fillRect(26,by,28,14);
    ctx.strokeStyle='#2a5a2a'; ctx.strokeRect(26,by,28,14);
    ctx.fillStyle='#3a3a3a';
    ctx.fillRect(62,by+2,12,10);
  }

  // Right gauges
  for(let i=0;i<4;i++){
    const by=85+i*56;
    ctx.beginPath(); ctx.arc(W-48,by,16,0,6.2832);
    ctx.fillStyle='#0c0c0c'; ctx.fill();
    ctx.strokeStyle=i===1?'#0f8':'#345'; ctx.lineWidth=1.8; ctx.stroke();
    ctx.save(); ctx.translate(W-48,by);
    ctx.rotate(Math.sin(performance.now()/680+i*1.2)*1.2);
    ctx.strokeStyle='#0f8'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-11); ctx.stroke();
    ctx.restore();
  }

  // Crosshair
  ctx.strokeStyle='rgba(0,255,145,0.85)'; ctx.lineWidth=1.4;
  const chs=18;
  ctx.beginPath();
  ctx.moveTo(CX-chs,CY); ctx.lineTo(CX-6,CY);
  ctx.moveTo(CX+6,CY); ctx.lineTo(CX+chs,CY);
  ctx.moveTo(CX,CY-chs); ctx.lineTo(CX,CY-6);
  ctx.moveTo(CX,CY+6); ctx.lineTo(CX,CY+chs);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(CX,CY-4); ctx.lineTo(CX+4,CY); ctx.lineTo(CX,CY+4); ctx.lineTo(CX-4,CY);
  ctx.closePath(); ctx.stroke();

  // Radar
  const rx=CX, ry=H-56, rr=44;
  ctx.beginPath(); ctx.arc(rx,ry,rr+4,0,6.2832);
  ctx.fillStyle='rgba(0,16,9,0.88)'; ctx.fill();
  ctx.strokeStyle='#0a5'; ctx.lineWidth=1.8; ctx.stroke();
  ctx.strokeStyle='rgba(0,100,50,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(rx,ry,rr*0.33,0,6.2832); ctx.stroke();
  ctx.beginPath(); ctx.arc(rx,ry,rr*0.66,0,6.2832); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx-rr,ry); ctx.lineTo(rx+rr,ry); ctx.moveTo(rx,ry-rr); ctx.lineTo(rx,ry+rr); ctx.stroke();
  ctx.fillStyle='#0f8';
  ctx.beginPath(); ctx.arc(rx,ry,2.6,0,6.2832); ctx.fill();

  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];
    const range=Math.hypot(e.x,e.z); if(range>280) continue;
    const ang=Math.atan2(e.x,e.z); const r=(range/280)*rr;
    ctx.fillStyle=e.type==='elite'?'#f80':'#f44';
    ctx.beginPath(); ctx.arc(rx+Math.sin(ang)*r, ry-Math.cos(ang)*r, e.type==='elite'?3:2.2,0,6.2832); ctx.fill();
  }
  for(let i=0;i<meteors.length;i++){
    const m=meteors[i];
    const range=Math.hypot(m.x,m.z); if(range>280) continue;
    const ang=Math.atan2(m.x,m.z); const r=(range/280)*rr;
    ctx.fillStyle='#a86';
    ctx.beginPath(); ctx.arc(rx+Math.sin(ang)*r, ry-Math.cos(ang)*r, 2.4,0,6.2832); ctx.fill();
  }
  if(activeM){
    const m=activeM; const range=Math.hypot(m.x,m.z); const ang=Math.atan2(m.x,m.z); const r=(range/280)*rr;
    ctx.fillStyle='#0ff';
    ctx.beginPath(); ctx.arc(rx+Math.sin(ang)*r, ry-Math.cos(ang)*r, 2.8,0,6.2832); ctx.fill();
  }
  ctx.fillStyle='#094'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText('RADAR',rx,ry+rr+11);
}

function drawHUD(){
  ctx.fillStyle='rgba(0,255,115,0.9)'; ctx.font='bold 14px monospace'; ctx.textAlign='left';
  ctx.fillText(`HULL  ${Math.max(0,Math.floor(hull))}%`,108,28);
  ctx.fillStyle='#122'; ctx.fillRect(108,34,148,8);
  ctx.fillStyle=hull>50?'#0f8':hull>25?'#fa0':'#f33';
  ctx.fillRect(108,34,148*(hull/100),8);

  ctx.fillStyle='#0ff'; ctx.fillText(`MISSILES  ${missiles}`,108,60);
  for(let i=0;i<5;i++){
    ctx.fillStyle=i<missiles?'#0ff':'#223';
    ctx.fillRect(108+i*20,66,16,6);
  }

  ctx.textAlign='right'; ctx.fillStyle='#0f8';
  ctx.fillText(`SCORE  ${score}`,W-108,28);
  ctx.fillText(`CHALLENGE  ${ch}/5`,W-108,50);
  const c=CHs[ch-1];
  ctx.fillStyle='#8f8'; ctx.font='11px monospace';
  ctx.fillText(c.n,W-108,68);

  const prog=kills/need;
  ctx.fillStyle='#122'; ctx.fillRect(W-256,78,148,6);
  ctx.fillStyle='#0f8'; ctx.fillRect(W-256,78,148*clamp(prog,0,1),6);

  ctx.textAlign='center';
  ctx.fillStyle=timer<25?'#f84':'#0f8';
  ctx.font='bold 16px monospace';
  const mins=Math.floor(Math.max(0,timer)/60);
  const secs=Math.floor(Math.max(0,timer)%60);
  ctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`,CX,28);

  ctx.font='12px monospace';
  for(let i=0;i<msgs.length;i++){
    const m=msgs[i];
    const a=clamp(1-(performance.now()/1000-m.t)/3.1,0,1);
    if(a<=0) continue;
    ctx.fillStyle=`rgba(0,255,175,${a})`;
    ctx.fillText(m.txt,CX,90+i*16);
  }
  msgs=msgs.filter(m=>performance.now()/1000-m.t<3.1);

  if(between){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0f8'; ctx.font='bold 30px monospace'; ctx.textAlign='center';
    ctx.fillText(`CHALLENGE ${ch} COMPLETE`,CX,CY-16);
    ctx.font='16px monospace'; ctx.fillStyle='#8f8';
    ctx.fillText(ch<5?`Next: ${CHs[ch].n}`:'ALL CHALLENGES CLEARED',CX,CY+18);
  }
  if(state==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0f8'; ctx.font='bold 40px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSED',CX,CY);
    ctx.font='15px monospace'; ctx.fillText('Tap Pause or press Esc',CX,CY+32);
  }
}

function msg(t){msgs.unshift({txt:t,t:performance.now()/1000}); if(msgs.length>3)msgs.pop();}

function loop(ts){
  if(state!=='playing'&&state!=='paused') return;
  const dt=Math.min((ts-last)/1000,0.05); last=ts;
  if(state==='playing') update(dt);

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  ctx.save();
  if(shake>0) ctx.translate(R(-shake,shake),R(-shake,shake));

  drawPlanets();
  drawStars();
  enemies.sort((a,b)=>b.z-a.z);
  for(let i=0;i<enemies.length;i++) drawShip(enemies[i]);
  for(let i=0;i<meteors.length;i++) drawMeteor(meteors[i]);
  drawPL(); drawEL(); drawMissile(); drawExpl(); drawParts();
  drawCockpit(); drawHUD();

  if(flash>0){
    ctx.fillStyle=`rgba(255,65,28,${flash})`;
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
  requestAnimationFrame(loop);
}

function end(won){
  stopEngine(); stopMusic();
  state=won?'won':'lost';
  document.getElementById('end').classList.remove('hidden');
  document.getElementById('et').textContent=won?'MISSION ACCOMPLISHED':'SHIP DESTROYED';
  document.getElementById('em').textContent=won
    ?'All five challenges cleared. Spider-Force prevails!'
    :'Hull integrity critical. Eject!';
  document.getElementById('fs').textContent=score;
}

// Prevent scrolling on mobile
document.body.addEventListener('touchmove',e=>{if(e.target.closest('#touchControls')||e.target===canvas)e.preventDefault();},{passive:false});

console.log('Spider-Force 5 v3 — Mobile Ready — Created by Webb Spinner Visions');
</script>
