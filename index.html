<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Force 5 | Webb Spinner Visions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#0f0}
canvas{display:block;margin:0 auto;background:#000;max-width:100%;max-height:100vh;box-shadow:0 0 60px rgba(0,180,100,.2)}
#start,#end{position:fixed;inset:0;background:radial-gradient(ellipse at center,#001a10 0%,#000 70%);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#0ff;z-index:20;text-align:center}
#start h1{font-size:3.2rem;color:#0f8;text-shadow:0 0 25px #0f8,0 0 50px #0a5;margin-bottom:6px;letter-spacing:5px;font-weight:700}
#start .credit{font-size:1.05rem;color:#6c8;margin-bottom:28px;letter-spacing:1.5px}
.btn{background:linear-gradient(180deg,#0a5,#053);border:2px solid #0f8;color:#0f8;padding:14px 42px;font-size:1.15rem;cursor:pointer;margin:10px;text-transform:uppercase;letter-spacing:2px;transition:all .2s;border-radius:2px}
.btn:hover{background:#0f8;color:#000;box-shadow:0 0 25px #0f8}
.ctrl{margin-top:26px;font-size:.88rem;color:#5a7;max-width:560px;line-height:1.55;background:rgba(0,30,15,.5);padding:16px 22px;border:1px solid #0a4;border-radius:4px}
.hidden{display:none!important}
#muteBtn{position:fixed;top:12px;right:14px;z-index:30;background:rgba(0,40,20,.7);border:1px solid #0a5;color:#0f8;padding:6px 12px;font-size:12px;cursor:pointer;border-radius:3px}
</style>
</head>
<body>
<button id="muteBtn">SOUND: ON</button>
<canvas id="c" width="1280" height="720"></canvas>
<div id="start">
  <h1>SPIDER-FORCE 5</h1>
  <div class="credit">Created by Webb Spinner Visions</div>
  <button class="btn" id="go">Launch Mission</button>
  <div class="ctrl">
    <b>CONTROLS</b><br>
    WASD / Arrow Keys — Pitch & Yaw<br>
    Shift (hold while turning) — Bank &nbsp;•&nbsp; Tap Shift — Barrel Roll<br>
    Space — Twin Blue Lasers &nbsp;•&nbsp; Enter — Fire / Detonate Missile<br>
    Esc — Pause
  </div>
</div>
<div id="end" class="hidden">
  <h1 id="et">MISSION COMPLETE</h1>
  <p id="em" style="font-size:1.25rem;margin:18px 0;color:#8f8"></p>
  <p style="margin-bottom:8px">Final Score: <span id="fs">0</span></p>
  <p style="font-size:.9rem;color:#6a8;margin-bottom:20px">Created by Webb Spinner Visions</p>
  <button class="btn" id="re">Fly Again</button>
</div>

<script>
// ============================================================
// SPIDER-FORCE 5  v2
// Enhanced visuals • Web Audio • Meteors • Planets
// Created by Webb Spinner Visions
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720, CX = W/2, CY = H/2;
const FOCAL = 520, NEAR = 2.5, FAR = 420;

// Audio
let audioCtx = null, masterGain = null, musicGain = null, muted = false;
let engineOsc = null, engineGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  masterGain.connect(audioCtx.destination);
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.12;
  musicGain.connect(masterGain);
}

function playTone(freq, type, dur, vol=0.3, slide=0) {
  if (!audioCtx || muted) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq+slide), audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(audioCtx.currentTime + dur + 0.05);
}

function playNoise(dur, vol=0.25, freq=800) {
  if (!audioCtx || muted) return;
  const bufferSize = audioCtx.sampleRate * dur;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufferSize, 1.5);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = freq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  noise.connect(filter); filter.connect(g); g.connect(masterGain);
  noise.start();
}

function sfxLaser() { playTone(880, 'square', 0.08, 0.15, -400); playTone(1200, 'square', 0.05, 0.08, -600); }
function sfxMissile() { playTone(180, 'sawtooth', 0.25, 0.2, 80); playNoise(0.3, 0.15, 400); }
function sfxExplode() { playNoise(0.45, 0.35, 600); playTone(90, 'sawtooth', 0.4, 0.25, -50); }
function sfxHit() { playTone(220, 'square', 0.12, 0.2, -100); playNoise(0.15, 0.18, 900); }
function sfxEnemyLaser() { playTone(420, 'sawtooth', 0.1, 0.12, -180); }
function sfxDamage() { playTone(140, 'square', 0.2, 0.28, -60); playNoise(0.25, 0.2, 300); }
function sfxMeteor() { playNoise(0.2, 0.12, 250); }

function startEngine() {
  if (!audioCtx || muted || engineOsc) return;
  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 55;
  engineGain.gain.value = 0.04;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 180;
  engineOsc.connect(filter); filter.connect(engineGain); engineGain.connect(masterGain);
  engineOsc.start();
}
function stopEngine() {
  if (engineOsc) { try { engineOsc.stop(); } catch(e){} engineOsc = null; engineGain = null; }
}

// Simple ambient music loop
let musicInterval = null;
function startMusic() {
  if (!audioCtx || muted || musicInterval) return;
  const notes = [110, 138.59, 164.81, 220, 164.81, 138.59];
  let i = 0;
  musicInterval = setInterval(() => {
    if (muted || !audioCtx) return;
    playTone(notes[i % notes.length], 'triangle', 0.35, 0.07);
    i++;
  }, 480);
}
function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

// Game state
let state = 'start', ch = 1, score = 0, hull = 100, missiles = 5, activeM = null;
let timer = 0, kills = 0, need = 10, last = 0, keys = {};
let bank = 0, tBank = 0, roll = 0, rolling = false, rT = 0;
let yaw = 0, pitch = 0, yV = 0, pV = 0;
let stars = [], enemies = [], meteors = [], pLasers = [], eLasers = [], parts = [], expl = [];
let planets = [], flash = 0, shake = 0, msgs = [], lastFire = 0, lastM = 0;
let done = false, between = false, bT = 0;

const CHs = [
  {n:"First Contact", d:95, need:10, spawn:1.9, spd:17, hp:1, fr:2.6, max:6},
  {n:"Swarm Rising", d:105, need:15, spawn:1.5, spd:21, hp:1.4, fr:2.1, max:9},
  {n:"Heavy Assault", d:115, need:20, spawn:1.15, spd:25, hp:2.0, fr:1.7, max:11},
  {n:"Elite Wing", d:125, need:26, spawn:0.95, spd:29, hp:2.8, fr:1.35, max:13},
  {n:"Spider's Final Stand", d:145, need:32, spawn:0.75, spd:34, hp:3.8, fr:1.05, max:15}
];

function R(a,b){return Math.random()*(b-a)+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z)}

function initStars() {
  stars = [];
  for (let i=0;i<260;i++) {
    stars.push({
      x: R(-320,320), y: R(-220,220), z: R(NEAR,FAR),
      bright: R(0.4,1), size: R(0.6,2.2), hue: Math.random() < 0.15 ? R(180,220) : R(190,230)
    });
  }
}

function initPlanets() {
  planets = [];
  for (let i=0;i<4;i++) {
    planets.push({
      x: R(-180,180), y: R(-100,100), z: R(280,380),
      r: R(18,55), color: `hsl(${R(15,50)},${R(40,70)}%,${R(25,45)}%)`,
      ring: Math.random() < 0.35, ringColor: `hsla(${R(30,60)},50%,60%,0.35)`
    });
  }
}

function reset(n) {
  const c = CHs[n-1];
  ch = n; missiles = 5; activeM = null;
  enemies = []; meteors = []; pLasers = []; eLasers = []; parts = []; expl = [];
  timer = c.d; need = c.need; kills = 0; done = false; between = false;
  yaw = 0; pitch = 0; bank = 0; tBank = 0; roll = 0; rolling = false;
  hull = Math.min(100, hull + 22);
  msg(`CHALLENGE ${n}: ${c.n}`);
}

function startGame() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  startEngine(); startMusic();
  score = 0; hull = 100;
  initStars(); initPlanets();
  reset(1);
  state = 'playing';
  document.getElementById('start').classList.add('hidden');
  document.getElementById('end').classList.add('hidden');
  last = performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('go').onclick = startGame;
document.getElementById('re').onclick = () => { document.getElementById('end').classList.add('hidden'); startGame(); };
document.getElementById('muteBtn').onclick = () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? 'SOUND: OFF' : 'SOUND: ON';
  if (muted) { stopEngine(); stopMusic(); }
  else if (state === 'playing') { startEngine(); startMusic(); }
};

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape' && state === 'playing') state = 'paused';
  else if (e.code === 'Escape' && state === 'paused') { state = 'playing'; last = performance.now(); requestAnimationFrame(loop); }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

function spawnEnemy() {
  const c = CHs[ch-1];
  if (enemies.length >= c.max) return;
  const side = Math.random() < 0.5 ? -1 : 1;
  enemies.push({
    x: R(-75,75) + side * R(20,55), y: R(-50,50), z: R(170,310),
    vx: R(-8,8), vy: R(-5,5),
    hp: c.hp, mhp: c.hp, spd: c.spd * R(0.85,1.15),
    cd: R(0.5, c.fr), type: Math.random() < 0.22 ? 'elite' : 'basic',
    rot: R(0, Math.PI*2)
  });
}

function spawnMeteor() {
  if (meteors.length > 4) return;
  meteors.push({
    x: R(-100,100), y: R(-70,70), z: R(200,340),
    vx: R(-12,12), vy: R(-8,8),
    spd: R(22,38), rot: R(0,6.28), spin: R(-3,3),
    size: R(8,18), hp: 2
  });
}

function fireL() {
  const now = performance.now()/1000;
  if (now - lastFire < 0.16) return;
  lastFire = now; sfxLaser();
  [-7,7].forEach(ox => pLasers.push({x: ox + yaw*14, y: pitch*9, z: 9, spd: 230, life: 1.15, dmg: 1}));
}

function fireM() {
  if (activeM || missiles <= 0) return;
  const now = performance.now()/1000;
  if (now - lastM < 0.45) return;
  lastM = now; missiles--; sfxMissile();
  activeM = {x: yaw*11, y: pitch*7, z: 14, spd: 92};
  msg("MISSILE AWAY — ENTER TO DETONATE");
}

function detonate() {
  if (!activeM) return;
  const m = activeM; sfxExplode();
  expl.push({x: m.x, y: m.y, z: m.z, r: 0, mr: 58, life: 0.7, hit: false});
  for (let i=0;i<40;i++) parts.push({
    x:m.x, y:m.y, z:m.z, vx:R(-45,45), vy:R(-45,45), vz:R(-30,30),
    life:R(0.4,0.9), col:`hsl(${R(15,50)},100%,${R(50,70)}%)`, sz:R(2,5)
  });
  flash = 0.5; shake = 14; activeM = null;
  msg("MISSILE DETONATED");
}

function update(dt) {
  if (state !== 'playing') return;
  if (between) {
    bT -= dt;
    if (bT <= 0) {
      between = false;
      if (ch >= 5) { end(true); return; }
      reset(ch + 1);
    }
    return;
  }
  timer -= dt;
  const c = CHs[ch-1];
  const ts = 1.55, my = 0.55, mp = 0.4;

  if (keys.KeyA || keys.ArrowLeft) { yV = -ts; tBank = 0.34; }
  else if (keys.KeyD || keys.ArrowRight) { yV = ts; tBank = -0.34; }
  else { yV *= 0.86; tBank *= 0.88; }
  if (keys.KeyW || keys.ArrowUp) pV = -ts * 0.78;
  else if (keys.KeyS || keys.ArrowDown) pV = ts * 0.78;
  else pV *= 0.86;

  yaw = clamp(yaw + yV*dt, -my, my);
  pitch = clamp(pitch + pV*dt, -mp, mp);
  bank += (tBank - bank) * 5.8 * dt;

  if ((keys.ShiftLeft || keys.ShiftRight) && !rolling && Math.abs(yV) > 1.05) {
    rolling = true; rT = 0; keys.ShiftLeft = keys.ShiftRight = false;
  }
  if (rolling) {
    rT += dt; roll = (rT / 0.72) * Math.PI * 2;
    if (rT >= 0.72) { rolling = false; roll = 0; }
  }

  if (keys.Space) fireL();
  if (keys.Enter) { if (activeM) detonate(); else fireM(); keys.Enter = false; }

  // Stars
  stars.forEach(s => {
    s.z -= 58 * dt;
    if (s.z < NEAR) { s.z = FAR; s.x = R(-320,320); s.y = R(-220,220); }
  });

  // Planets drift slowly
  planets.forEach(p => {
    p.z -= 8 * dt;
    if (p.z < 120) { p.z = R(300,400); p.x = R(-180,180); p.y = R(-100,100); }
  });

  if (Math.random() < dt / c.spawn) spawnEnemy();
  if (Math.random() < dt * 0.18) spawnMeteor();

  // Enemies
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.z -= e.spd * dt; e.x += e.vx * dt; e.y += e.vy * dt;
    e.vx += (-e.x * 0.13 - e.vx * 0.4) * dt;
    e.vy += (-e.y * 0.11 - e.vy * 0.4) * dt;
    e.rot += dt * 0.4; e.cd -= dt;

    if (e.cd <= 0 && e.z < 155 && e.z > 14) {
      eLasers.push({x:e.x, y:e.y, z:e.z, tx:-yaw*38+R(-8,8), ty:-pitch*28+R(-6,6), spd:88, life:2.3});
      e.cd = c.fr * R(0.7,1.3); sfxEnemyLaser();
    }
    if (e.z < 4.5) {
      if (Math.abs(e.x) < 12 && Math.abs(e.y) < 10) {
        hull -= 17; flash = 0.5; shake = 16; sfxDamage(); msg("HULL BREACH!");
      }
      enemies.splice(i,1); continue;
    }
    if (e.hp <= 0) {
      score += Math.floor(95 + e.z); kills++; sfxHit();
      for (let p=0;p<16;p++) parts.push({x:e.x,y:e.y,z:e.z,vx:R(-42,42),vy:R(-42,42),vz:R(-18,32),life:R(0.3,0.65),col:e.type==='elite'?'#f80':'#f44',sz:R(1.8,3.8)});
      enemies.splice(i,1);
    }
  }

  // Meteors
  for (let i = meteors.length-1; i >= 0; i--) {
    const m = meteors[i];
    m.z -= m.spd * dt; m.x += m.vx * dt; m.y += m.vy * dt; m.rot += m.spin * dt;
    if (m.z < 5) {
      if (Math.abs(m.x) < 14 && Math.abs(m.y) < 12) {
        hull -= 12; flash = 0.4; shake = 12; sfxDamage(); msg("METEOR IMPACT!");
      }
      meteors.splice(i,1); continue;
    }
    if (m.hp <= 0) {
      score += 60; sfxMeteor();
      for (let p=0;p<12;p++) parts.push({x:m.x,y:m.y,z:m.z,vx:R(-30,30),vy:R(-30,30),vz:R(-10,20),life:R(0.25,0.5),col:'#a86',sz:R(1.5,3)});
      meteors.splice(i,1);
    }
  }

  // Player lasers
  for (let i = pLasers.length-1; i >= 0; i--) {
    const l = pLasers[i];
    l.z += l.spd * dt; l.life -= dt;
    if (l.life <= 0 || l.z > FAR) { pLasers.splice(i,1); continue; }
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.abs(l.z - e.z) < 12 && Math.hypot(l.x-e.x, l.y-e.y) < 14) {
        e.hp -= l.dmg;
        for (let p=0;p<5;p++) parts.push({x:e.x,y:e.y,z:e.z,vx:R(-18,18),vy:R(-18,18),vz:R(-8,16),life:0.28,col:'#4af',sz:1.6});
        pLasers.splice(i,1); break;
      }
    }
    for (let j = meteors.length-1; j >= 0; j--) {
      const m = meteors[j];
      if (Math.abs(l.z - m.z) < 14 && Math.hypot(l.x-m.x, l.y-m.y) < m.size*1.1) {
        m.hp -= 1; pLasers.splice(i,1); break;
      }
    }
  }

  // Enemy lasers
  for (let i = eLasers.length-1; i >= 0; i--) {
    const l = eLasers[i];
    l.x += (l.tx - l.x) * 2.3 * dt;
    l.y += (l.ty - l.y) * 2.3 * dt;
    l.z -= l.spd * dt; l.life -= dt;
    if (l.z < 3.5) {
      if (Math.abs(l.x - yaw*20) < 14 && Math.abs(l.y - pitch*15) < 12) {
        hull -= 7 + ch*1.4; flash = 0.35; shake = 9; sfxDamage();
      }
      eLasers.splice(i,1); continue;
    }
    if (l.life <= 0) eLasers.splice(i,1);
  }

  if (activeM) {
    activeM.z += activeM.spd * dt;
    activeM.x *= 0.97; activeM.y *= 0.97;
    if (activeM.z > FAR - 20) activeM = null;
  }

  for (let i = expl.length-1; i >= 0; i--) {
    const x = expl[i];
    x.r += (x.mr - x.r) * 7.5 * dt; x.life -= dt;
    if (!x.hit && x.r > x.mr * 0.4) {
      x.hit = true;
      enemies.forEach(e => { if (dist(x,e) < x.mr*1.1) { e.hp -= 3.5; if (e.hp<=0){score+=145;kills++;} } });
      meteors.forEach(m => { if (dist(x,m) < x.mr*1.0) m.hp -= 3; });
    }
    if (x.life <= 0) expl.splice(i,1);
  }

  for (let i = parts.length-1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt; p.life -= dt;
    if (p.life <= 0) parts.splice(i,1);
  }

  flash = Math.max(0, flash - dt*1.7);
  shake = Math.max(0, shake - dt*24);

  if (hull <= 0) { hull = 0; end(false); return; }
  if (kills >= need && !done) {
    done = true; between = true; bT = 3.4;
    score += Math.floor(timer*4.5) + ch*190;
    msg(`CHALLENGE ${ch} COMPLETE!`);
  }
}

function proj(x,y,z) {
  if (z <= NEAR) z = NEAR + 0.01;
  const sc = FOCAL / z;
  return { sx: CX + (x - yaw*40)*sc, sy: CY + (y - pitch*30)*sc, sc };
}

function drawStars() {
  ctx.save();
  ctx.translate(CX, CY); ctx.rotate(bank + roll); ctx.translate(-CX, -CY);
  stars.forEach(s => {
    const p = proj(s.x, s.y, s.z);
    const b = clamp(1.15 - s.z/FAR, 0.15, 1) * s.bright;
    const sz = clamp(s.size * (FOCAL/s.z) * 0.018, 0.5, 2.8);
    ctx.fillStyle = `hsla(${s.hue},70%,75%,${b})`;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, sz, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawPlanets() {
  ctx.save();
  ctx.translate(CX, CY); ctx.rotate(bank + roll); ctx.translate(-CX, -CY);
  planets.forEach(pl => {
    const p = proj(pl.x, pl.y, pl.z);
    const r = pl.r * p.sc * 0.12;
    if (r < 3) return;
    const g = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r*1.4);
    g.addColorStop(0, pl.color);
    g.addColorStop(0.7, pl.color.replace(')',',0.4)').replace('hsl','hsla'));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, r*1.4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = pl.color;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(p.sx + r*0.25, p.sy, r*0.7, r, 0, -Math.PI/2, Math.PI/2); ctx.fill();
    if (pl.ring) {
      ctx.strokeStyle = pl.ringColor; ctx.lineWidth = r*0.18;
      ctx.beginPath(); ctx.ellipse(p.sx, p.sy, r*1.6, r*0.35, 0.3, 0, Math.PI*2); ctx.stroke();
    }
  });
  ctx.restore();
}

function drawShip(e) {
  const p = proj(e.x, e.y, e.z);
  const s = 11 * p.sc * 0.09;
  if (s < 1.3 || p.sx < -60 || p.sx > W+60) return;
  ctx.save();
  ctx.translate(p.sx, p.sy);
  ctx.rotate(e.rot * 0.15);
  const hp = e.hp / e.mhp;
  const isElite = e.type === 'elite';

  if (isElite) {
    ctx.fillStyle = `rgb(255,${80+hp*90},20)`;
    ctx.strokeStyle = '#fc8'; ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(0, -s*1.5);
    ctx.lineTo(s*0.55, -s*0.2);
    ctx.lineTo(s*0.35, s*0.9);
    ctx.lineTo(0, s*0.45);
    ctx.lineTo(-s*0.35, s*0.9);
    ctx.lineTo(-s*0.55, -s*0.2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = `rgb(220,${60+hp*70},10)`;
    ctx.beginPath(); ctx.moveTo(s*0.4, -s*0.1); ctx.lineTo(s*1.4, s*0.3); ctx.lineTo(s*0.5, s*0.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-s*0.4, -s*0.1); ctx.lineTo(-s*1.4, s*0.3); ctx.lineTo(-s*0.5, s*0.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(100,200,255,0.7)';
    ctx.beginPath(); ctx.ellipse(0, -s*0.5, s*0.22, s*0.35, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,120,0,0.85)';
    ctx.beginPath(); ctx.arc(-s*0.22, s*0.7, s*0.18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.22, s*0.7, s*0.18, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = `rgb(255,${40+hp*70},45)`;
    ctx.strokeStyle = '#f99'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, -s*1.35);
    ctx.lineTo(s*0.7, s*0.15);
    ctx.lineTo(s*0.35, s*0.85);
    ctx.lineTo(0, s*0.4);
    ctx.lineTo(-s*0.35, s*0.85);
    ctx.lineTo(-s*0.7, s*0.15);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = `rgb(200,${30+hp*50},30)`;
    ctx.beginPath(); ctx.moveTo(s*0.5, s*0.1); ctx.lineTo(s*1.1, s*0.55); ctx.lineTo(s*0.4, s*0.55); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-s*0.5, s*0.1); ctx.lineTo(-s*1.1, s*0.55); ctx.lineTo(-s*0.4, s*0.55); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,80,0,0.75)';
    ctx.beginPath(); ctx.arc(0, s*0.65, s*0.22, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawMeteor(m) {
  const p = proj(m.x, m.y, m.z);
  const s = m.size * p.sc * 0.09;
  if (s < 2) return;
  ctx.save();
  ctx.translate(p.sx, p.sy);
  ctx.rotate(m.rot);
  ctx.fillStyle = '#6a5a4a';
  ctx.strokeStyle = '#8a7a6a'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  for (let i=0;i<7;i++) {
    const a = (i/7)*Math.PI*2;
    const r = s * (0.75 + Math.sin(i*2.3)*0.25);
    if (i===0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(-s*0.2, -s*0.15, s*0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.25, s*0.1, s*0.15, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPL() {
  pLasers.forEach(l => {
    const p1 = proj(l.x, l.y, l.z), p2 = proj(l.x, l.y, l.z+18);
    ctx.strokeStyle = `rgba(80,190,255,${clamp(l.life,0,1)})`;
    ctx.lineWidth = 3.4 * (p1.sc*0.02); ctx.shadowColor = '#4cf'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke();
    ctx.shadowBlur = 0;
  });
}
function drawEL() {
  eLasers.forEach(l => {
    const p1 = proj(l.x,l.y,l.z), p2 = proj(l.x*0.7,l.y*0.7,l.z+13);
    ctx.strokeStyle = 'rgba(255,40,40,0.9)'; ctx.lineWidth = 2.6;
    ctx.shadowColor = '#f22'; ctx.shadowBlur = 9;
    ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke();
    ctx.shadowBlur = 0;
  });
}
function drawMissile() {
  if (!activeM) return;
  const m = activeM, p = proj(m.x,m.y,m.z), s = 6*p.sc*0.08;
  ctx.save(); ctx.translate(p.sx,p.sy);
  ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.moveTo(0,-s*1.5); ctx.lineTo(s*0.6,s); ctx.lineTo(-s*0.6,s); ctx.closePath(); ctx.fill();
  ctx.restore(); ctx.shadowBlur = 0;
}
function drawExpl() {
  expl.forEach(x => {
    const p = proj(x.x,x.y,x.z); const r = x.r * p.sc * 0.115; const a = clamp(x.life*1.35,0,0.8);
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,160,40,${a*0.32})`; ctx.fill();
    ctx.strokeStyle = `rgba(255,220,100,${a})`; ctx.lineWidth = 2.8; ctx.stroke();
  });
}
function drawParts() {
  parts.forEach(p => {
    const pr = proj(p.x,p.y,p.z);
    ctx.globalAlpha = clamp(p.life*1.9,0,1);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(pr.sx,pr.sy,p.sz*(pr.sc*0.04+0.45),0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawCockpit() {
  const grd = ctx.createRadialGradient(CX,CY,140,CX,CY,540);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(0.55,'rgba(0,0,0,0.08)');
  grd.addColorStop(0.85,'rgba(0,0,0,0.45)');
  grd.addColorStop(1,'rgba(0,0,0,0.82)');
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = '#0a100a';
  ctx.fillRect(0,0,W,52);
  ctx.fillRect(0,H-118,W,118);
  ctx.fillStyle = '#080e08';
  ctx.fillRect(0,52,102,H-170);
  ctx.fillRect(W-102,52,102,H-170);

  ctx.strokeStyle = '#1c3c1c'; ctx.lineWidth = 3;
  ctx.strokeRect(3,3,W-6,H-6);
  ctx.beginPath();
  ctx.moveTo(102,52); ctx.lineTo(102,H-118);
  ctx.moveTo(W-102,52); ctx.lineTo(W-102,H-118);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(30,80,40,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(130,70); ctx.lineTo(W-130,70);
  ctx.moveTo(115,H-140); ctx.lineTo(W-115,H-140);
  ctx.stroke();

  for (let i=0;i<7;i++) {
    const by = 78 + i*48;
    const lit = (i%3===0 && Math.sin(performance.now()/260 + i) > 0.2);
    ctx.fillStyle = lit ? '#0f8' : '#142814';
    ctx.fillRect(28,by,30,15);
    ctx.strokeStyle = '#2a5a2a'; ctx.strokeRect(28,by,30,15);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(66,by+2,14,11);
    ctx.fillStyle = lit ? '#0f0' : '#030';
    ctx.beginPath(); ctx.arc(90,by+7.5,3.5,0,Math.PI*2); ctx.fill();
  }

  for (let i=0;i<5;i++) {
    const by = 90 + i*58;
    ctx.beginPath(); ctx.arc(W-52,by,18,0,Math.PI*2);
    ctx.fillStyle = '#0c0c0c'; ctx.fill();
    ctx.strokeStyle = i===1 ? '#0f8' : '#345'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save(); ctx.translate(W-52,by);
    ctx.rotate(Math.sin(performance.now()/700 + i*1.3)*1.3);
    ctx.strokeStyle = '#0f8'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-13); ctx.stroke();
    ctx.restore();
  }

  ctx.strokeStyle = 'rgba(0,255,150,0.88)'; ctx.lineWidth = 1.5;
  const ch = 20;
  ctx.beginPath();
  ctx.moveTo(CX-ch,CY); ctx.lineTo(CX-7,CY);
  ctx.moveTo(CX+7,CY); ctx.lineTo(CX+ch,CY);
  ctx.moveTo(CX,CY-ch); ctx.lineTo(CX,CY-7);
  ctx.moveTo(CX,CY+7); ctx.lineTo(CX,CY+ch);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(CX,CY-5); ctx.lineTo(CX+5,CY); ctx.lineTo(CX,CY+5); ctx.lineTo(CX-5,CY);
  ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.arc(CX,CY,28,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,140,0.25)'; ctx.lineWidth = 1; ctx.stroke();

  const rx = CX, ry = H-62, rr = 48;
  ctx.beginPath(); ctx.arc(rx,ry,rr+5,0,Math.PI*2);
  ctx.fillStyle = 'rgba(0,18,10,0.88)'; ctx.fill();
  ctx.strokeStyle = '#0a6'; ctx.lineWidth = 2; ctx.stroke();
  ctx.strokeStyle = 'rgba(0,110,55,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(rx,ry,rr*0.33,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(rx,ry,rr*0.66,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx-rr,ry); ctx.lineTo(rx+rr,ry); ctx.moveTo(rx,ry-rr); ctx.lineTo(rx,ry+rr); ctx.stroke();
  ctx.fillStyle = '#0f8';
  ctx.beginPath(); ctx.moveTo(rx,ry-rr+5); ctx.lineTo(rx-5,ry-rr+14); ctx.lineTo(rx+5,ry-rr+14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(rx,ry,3,0,Math.PI*2); ctx.fill();

  enemies.forEach(e => {
    const range = Math.hypot(e.x,e.z); if (range > 290) return;
    const ang = Math.atan2(e.x,e.z); const r = (range/290)*rr;
    ctx.fillStyle = e.type==='elite' ? '#f80' : '#f44';
    ctx.beginPath(); ctx.arc(rx + Math.sin(ang)*r, ry - Math.cos(ang)*r, e.type==='elite'?3.3:2.4, 0, Math.PI*2); ctx.fill();
  });
  meteors.forEach(m => {
    const range = Math.hypot(m.x,m.z); if (range > 290) return;
    const ang = Math.atan2(m.x,m.z); const r = (range/290)*rr;
    ctx.fillStyle = '#a86';
    ctx.beginPath(); ctx.arc(rx + Math.sin(ang)*r, ry - Math.cos(ang)*r, 2.6, 0, Math.PI*2); ctx.fill();
  });
  if (activeM) {
    const m = activeM; const range = Math.hypot(m.x,m.z); const ang = Math.atan2(m.x,m.z); const r = (range/290)*rr;
    ctx.fillStyle = '#0ff';
    ctx.beginPath(); ctx.arc(rx + Math.sin(ang)*r, ry - Math.cos(ang)*r, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#0a4'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('RADAR', rx, ry + rr + 13);
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,255,120,0.92)'; ctx.font = 'bold 15px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`HULL  ${Math.max(0,Math.floor(hull))}%`, 115, 30);
  ctx.fillStyle = '#133'; ctx.fillRect(115,37,155,9);
  ctx.fillStyle = hull>50?'#0f8':hull>25?'#fa0':'#f33';
  ctx.fillRect(115,37,155*(hull/100),9);

  ctx.fillStyle = '#0ff'; ctx.fillText(`MISSILES  ${missiles}`, 115, 66);
  for (let i=0;i<5;i++) {
    ctx.fillStyle = i<missiles ? '#0ff' : '#234';
    ctx.fillRect(115+i*21,73,17,7);
  }

  ctx.textAlign = 'right'; ctx.fillStyle = '#0f8';
  ctx.fillText(`SCORE  ${score}`, W-115, 30);
  ctx.fillText(`CHALLENGE  ${ch}/5`, W-115, 53);
  const c = CHs[ch-1];
  ctx.fillStyle = '#8f8'; ctx.font = '12px monospace';
  ctx.fillText(c.n, W-115, 74);

  const prog = kills / need;
  ctx.fillStyle = '#133'; ctx.fillRect(W-270,84,155,7);
  ctx.fillStyle = '#0f8'; ctx.fillRect(W-270,84,155*clamp(prog,0,1),7);

  ctx.textAlign = 'center';
  ctx.fillStyle = timer < 18 ? '#f84' : '#0f8';
  ctx.font = 'bold 17px monospace';
  const mins = Math.floor(Math.max(0,timer)/60);
  const secs = Math.floor(Math.max(0,timer)%60);
  ctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`, CX, 30);

  ctx.font = '13px monospace';
  msgs.forEach((m,i) => {
    const a = clamp(1 - (performance.now()/1000 - m.t)/3.3, 0, 1);
    if (a <= 0) return;
    ctx.fillStyle = `rgba(0,255,180,${a})`;
    ctx.fillText(m.txt, CX, 95 + i*18);
  });
  msgs = msgs.filter(m => performance.now()/1000 - m.t < 3.3);

  if (between) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#0f8'; ctx.font = 'bold 34px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`CHALLENGE ${ch} COMPLETE`, CX, CY-18);
    ctx.font = '18px monospace'; ctx.fillStyle = '#8f8';
    ctx.fillText(ch < 5 ? `Next: ${CHs[ch].n}` : 'ALL CHALLENGES CLEARED', CX, CY+22);
  }
  if (state === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#0f8'; ctx.font = 'bold 44px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PAUSED', CX, CY);
    ctx.font = '16px monospace'; ctx.fillText('Press ESC to resume', CX, CY+36);
  }
}

function msg(t) { msgs.unshift({txt:t, t:performance.now()/1000}); if (msgs.length > 3) msgs.pop(); }

function loop(ts) {
  if (state !== 'playing' && state !== 'paused') return;
  const dt = Math.min((ts - last)/1000, 0.05); last = ts;
  if (state === 'playing') update(dt);

  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.save();
  if (shake > 0) ctx.translate(R(-shake,shake), R(-shake,shake));

  drawPlanets();
  drawStars();
  enemies.sort((a,b) => b.z - a.z);
  enemies.forEach(drawShip);
  meteors.forEach(drawMeteor);
  drawPL(); drawEL(); drawMissile(); drawExpl(); drawParts();
  drawCockpit(); drawHUD();

  if (flash > 0) {
    ctx.fillStyle = `rgba(255,70,30,${flash})`;
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
  requestAnimationFrame(loop);
}

function end(won) {
  stopEngine(); stopMusic();
  state = won ? 'won' : 'lost';
  document.getElementById('end').classList.remove('hidden');
  document.getElementById('et').textContent = won ? 'MISSION ACCOMPLISHED' : 'SHIP DESTROYED';
  document.getElementById('em').textContent = won
    ? 'All five challenges cleared. Spider-Force prevails!'
    : 'Hull integrity critical. Eject!';
  document.getElementById('fs').textContent = score;
}

console.log('Spider-Force 5 v2 — Created by Webb Spinner Visions');
</script>
